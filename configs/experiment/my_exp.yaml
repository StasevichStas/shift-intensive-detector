# @package _global_

defaults:
  - override /data: cs_datamodule
  - override /model: base_det
  - override /callbacks: default
  - override /trainer: gpu


tags: ["my_exp", "rcnn", "convnext_base"]
experiment_name: 'mobilenetv3_large_100_new_lrUP'
seed: 12345

#ckpt_path: для возобновления эксперимента

trainer:
  min_epochs: 10
  max_epochs: 10
  gradient_clip_val: 0.5
  precision: '16-mixed'


model:
  optimizer:
    # Возвращаем законный высокий LR для легких сетей
    lr: 1e-3                     

  scheduler:
    _target_: "src.lit_modules.schedulers.ChainCyclicLR"
    _partial_: true
    lr_min: 5e-5                  # Минимум делаем повыше, чтобы сеть не засыпала
    lr_max: 1e-3                  # Пик равен lr из оптимизатора
    
    # Адаптируем шаги под короткое обучение (10 эпох):
    warmup_steps: 150             # Быстрый разогрев (буквально за первые пол-эпохи)
    T0: 400                       # Делаем волны короче, чтобы за 10 эпох сеть успела несколько раз упасть и подняться
    scale_factor: 0.7             # Ослабляем затухание (0.7 вместо 0.5), чтобы держать LR высоким дольше

data:
  batch_size: 32
