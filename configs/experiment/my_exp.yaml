# @package _global_

defaults:
  - override /data: cs_datamodule
  - override /model: base_det
  - override /callbacks: default
  - override /trainer: gpu


tags: ["my_exp", "rcnn", "convnext_base"]
experiment_name: 'mobilenetv3_large_100_new_head'
seed: 12345

#ckpt_path: для возобновления эксперимента

trainer:
  min_epochs: 10
  max_epochs: 10
  gradient_clip_val: 0.5
  precision: '16-mixed'

model:

  optimizer:
    lr: 3e-4                     # Для тяжелых сетей базовый LR лучше сделать поменьше (например, 2e-4 или 3e-4)

  scheduler:
    _target_: "src.lit_modules.schedulers.ChainCyclicLR"
    _partial_: true
    lr_min: 1e-6
    lr_max: 3e-4
    T0: 1000
    warmup_steps: 500
    scale_factor: 0.5

data:
  batch_size: 4
